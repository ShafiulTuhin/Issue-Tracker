<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Issue-Tracker | Home</title>
    <link
      rel="shortcut icon"
      href="assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Daisy UI Themes -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="">
    <header class="py-6 md:px-10 px-3 shadow-sm">
      <div class="flex justify-between items-center">
        <div class="flex gap-2 items-center">
          <img
            src="assets/github-logo.png"
            class="w-8 md:me-0 me-4"
            alt="header_logo"
          />
          <h2 class="hidden md:block font-semibold text-2xl text-[#1F2937]">
            Github Issues Tracker
          </h2>
        </div>
        <div class="join">
          <div>
            <label class="input validator join-item">
              <i class="fa-solid fa-magnifying-glass text-[#64748B]"></i>
              <input
                id="input-search"
                type="text"
                placeholder="Search Issues"
                required
              />
            </label>
          </div>
          <button id="search-button" class="btn btn-primary join-item ml-5">
            <i class="fa-solid fa-plus"></i>
            New Issue
          </button>
        </div>
      </div>
    </header>
    <main class="bg-slate-100 md:py-10 py-1">
      <!-- All Button -->
      <section class="container mx-auto">
        <div
          class="mt-12 px-5 py-10 bg-white rounded-lg space-x-4 shadow-sm text-[#64748B] font-medium"
        >
          <button
            id="button-all"
            class="remove-active border border-gray-300 px-6 py-2 rounded-lg cursor-pointer hover:bg-slate-100 transition duration-300"
          >
            All
          </button>
          <button
            id="button-open"
            onclick="displayOpenIssues()"
            class="remove-active border border-gray-300 px-6 py-2 rounded-lg cursor-pointer hover:bg-slate-100 transition duration-300"
          >
            Open
          </button>
          <button
            id="button-close"
            onclick="displayCloseIssues()"
            class="remove-active border border-gray-300 px-6 py-2 rounded-lg cursor-pointer hover:bg-slate-100 transition duration-300"
          >
            Closed
          </button>
        </div>
      </section>
      <!-- Issue count and status -->
      <section class="container mx-auto mt-6 bg-white px-4 shadow-sm">
        <div class="flex justify-between items-center rounded-lg py-4">
          <div class="flex gap-4 items-center">
            <div class="bg-slate-200 p-5 rounded-full">
              <img src="assets/Aperture.png" alt="" />
            </div>
            <div>
              <h2 class="text-[#1F2937] text-[20px] font-semibold">
                <span id="issue-counter"></span> Issues
              </h2>

              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex gap-4">
            <div class="flex">
              <img src="assets/green-dot.jpg" class="w-4" alt="" />
              <p>Open</p>
            </div>
            <div class="flex">
              <img src="assets/pruple-dot.jpg" class="w-4" alt="" />
              <p>Closed</p>
            </div>
          </div>
        </div>
      </section>
      <!-- Spinner -->
      <section class="container mx-auto">
        <div id="spinner" class="py-20 flex hidden justify-center gap-5">
          <span class="loading loading-spinner text-primary"></span>
          <span class="loading loading-spinner text-primary"></span>
          <span class="loading loading-spinner text-primary"></span>
        </div>
      </section>
      <!-- Issue container -->
      <section
        id="issue-container"
        class="container mx-auto px-4 mt-6 grid md:grid-cols-4 grid-cols-1 gap-4"
      >
        <!--Render issues here  -->
      </section>
      <!--Issue details Modal -->
      <dialog id="issue-details-modal" class="modal">
        <div class="modal-box">
          <div id="modal-details">
            <!-- Modal details render here -->
          </div>
          <div class="modal-action">
            <form method="dialog">
              <!-- if there is a button in form, it will close the modal -->
              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>
    </main>
    <script src="script.js"></script>
  </body>
</html>
